<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webhook Test Page</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    .wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    input {
      width: 280px;
      max-width: 80vw;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      padding: 12px 18px;
      font-size: 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #status {
      min-height: 20px;
      font-size: 13px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <input id="testerName" type="text" value="GitHub Pages test" placeholder="표시할 이름" />
      <button id="sendBtn">웹훅 테스트 보내기</button>
      <div id="status"></div>
    </div>
  </div>

  <script>
    // 보안을 위해 노출된 기존 웹훅은 쓰지 말고, 새로 만든 웹훅 URL로 교체하세요.
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1492109303853748385/-QlhnIxQh5orXT4V0XdFTS52L_GI5XGnolGYLZ0wh0OR9N1bxyHRkBAqyIVngkCHHCUe";

    const sendBtn = document.getElementById("sendBtn");
    const statusEl = document.getElementById("status");
    const testerNameEl = document.getElementById("testerName");

    function setStatus(message) {
      statusEl.textContent = message;
    }

    sendBtn.addEventListener("click", async () => {
      if (!WEBHOOK_URL || WEBHOOK_URL.includes("PASTE_NEW_DISCORD_WEBHOOK_URL_HERE")) {
        setStatus("새 Discord 웹훅 URL을 먼저 넣어주세요.");
        return;
      }

      const testerName = testerNameEl.value.trim() || "Unnamed tester";
      const now = new Date();

      const payload = {
        content: [
          "웹훅 테스트 알림",
          `표시 이름: ${testerName}`,
          `시간: ${now.toLocaleString("ko-KR")}`,
          `페이지: ${location.href}`,
          `경로: ${location.pathname}`,
          `리퍼러: ${document.referrer || "없음"}`,
          `브라우저 UA: ${navigator.userAgent}`,
          `언어: ${navigator.language}`,
          `화면 크기: ${window.screen.width}x${window.screen.height}`,
          `뷰포트: ${window.innerWidth}x${window.innerHeight}`,
          `플랫폼: ${navigator.platform || "알 수 없음"}`
        ].join("\n")
      };

      try {
        setStatus("전송 중...");

        const res = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        setStatus("전송 완료");
      } catch (err) {
        console.error(err);
        setStatus("전송 실패");
      }
    });
  </script>
</body>
</html>
